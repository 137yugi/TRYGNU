<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#160b16" />
    <title>端末ライブ入力ヘルパー</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08070b;
        --panel: #150b16;
        --panel-2: #1d1120;
        --line: #8f6b3f;
        --gold: #ffd166;
        --cyan: #51d6ff;
        --pink: #ff5f8f;
        --text: #f3f7ff;
        --muted: #aeb8c9;
        --bad: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, #160b16 0%, #07070c 56%, #05060a 100%);
        background-size: 4px 4px, auto;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        width: min(760px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: max(14px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
          max(14px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .header,
      .panel,
      .log {
        border: 1px solid rgba(255, 209, 102, 0.28);
        background: rgba(10, 8, 14, 0.9);
        box-shadow: 4px 4px 0 #000;
      }

      .header {
        padding: 12px;
        display: grid;
        gap: 5px;
      }

      h1 {
        margin: 0;
        color: var(--gold);
        font-size: clamp(20px, 6vw, 32px);
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 3px 3px 0 #000;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        min-height: 34px;
        padding: 8px 10px;
        border: 1px solid rgba(81, 214, 255, 0.45);
        color: #dff9ff;
        background: rgba(5, 8, 22, 0.72);
        overflow-wrap: anywhere;
      }

      .panel {
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
      }

      label span {
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 8px 9px;
        color: var(--text);
        background: #120812;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--gold);
      }

      .actions {
        display: grid;
        grid-template-columns: 1.3fr 1fr 1fr;
        gap: 8px;
      }

      .bridge-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .presets {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 9px 10px;
        color: var(--text);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, #2a1724, #120812);
        background-size: 4px 4px, auto;
        box-shadow: 3px 3px 0 #000;
      }

      button:hover,
      button:focus-visible {
        border-color: var(--gold);
      }

      .preset {
        min-height: 48px;
        display: grid;
        align-content: center;
        gap: 3px;
        padding: 9px 8px;
        text-align: left;
        touch-action: manipulation;
      }

      .preset strong {
        color: var(--gold);
        font-size: 13px;
        line-height: 1.1;
      }

      .preset span {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
      }

      .preset[aria-pressed="true"] {
        border-color: var(--cyan);
        color: #eafff9;
      }

      .primary {
        border-color: var(--gold);
        color: #eafff9;
      }

      .secondary {
        border-color: var(--cyan);
      }

      .danger {
        border-color: var(--pink);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .chip {
        border: 1px solid rgba(255, 209, 102, 0.28);
        padding: 5px 7px;
        color: #dce8ff;
        background: rgba(26, 16, 29, 0.86);
        font-size: 11px;
      }

      .log {
        min-height: 118px;
        max-height: 220px;
        margin: 0;
        padding: 10px;
        color: #dce8ff;
        overflow: auto;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 12px;
        line-height: 1.45;
      }

      .preview {
        margin: 0;
        padding: 10px;
        border: 1px solid rgba(143, 107, 63, 0.72);
        background: rgba(5, 8, 22, 0.52);
        color: #dce8ff;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 12px;
        line-height: 1.45;
      }

      .bad {
        color: var(--bad);
      }

      .admin-only {
        display: none !important;
      }

      body.admin-mode label.admin-only,
      body.admin-mode .grid.admin-only,
      body.admin-mode .actions.admin-only,
      body.admin-mode .presets.admin-only {
        display: grid !important;
      }

      body.admin-mode .chips.admin-only {
        display: flex !important;
      }

      body.admin-mode button.admin-only,
      body.admin-mode .preview.admin-only,
      body.admin-mode .log.admin-only {
        display: block !important;
      }

      body:not(.admin-mode) .bridge-actions {
        grid-template-columns: 1fr;
      }

      @media (max-width: 620px) {
        .shell {
          gap: 10px;
        }

        .grid,
        .actions,
        .bridge-actions,
        .presets {
          grid-template-columns: 1fr;
        }

        .preset {
          min-height: 52px;
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>端末ライブ入力</h1>
        <p class="sub">同じオリジンで開いたゲーム画面へ、ブラウザ内だけでギフトイベントを投入します。</p>
        <div id="status" class="status" role="status" aria-live="polite">待機中</div>
      </header>

      <section class="panel" aria-label="送信フォーム">
        <label class="admin-only">
          <span>端末チャンネル</span>
          <input id="channelInput" value="stream-raid-live-v1" autocapitalize="off" autocomplete="off" spellcheck="false" />
        </label>

        <div class="grid">
          <label>
            <span>TikTok ID</span>
            <input id="bridgeTikTokIdInput" placeholder="your_tiktok_id" autocapitalize="off" autocomplete="off" spellcheck="false" />
          </label>
          <label class="admin-only">
            <span>Bridge URL</span>
            <input id="bridgeUrlInput" value="http://127.0.0.1:8091" autocapitalize="off" autocomplete="off" spellcheck="false" />
          </label>
          <label class="admin-only">
            <span>ポーリング間隔(ms)</span>
            <input id="bridgeIntervalInput" type="number" inputmode="numeric" min="300" max="10000" step="100" value="1000" />
          </label>
        </div>

        <div class="bridge-actions">
          <button id="bridgeHealthBtn" class="secondary admin-only" type="button">Bridge確認</button>
          <button id="bridgeConnectBtn" class="primary" type="button">ID接続+開始</button>
          <button id="bridgeStartBtn" class="secondary admin-only" type="button">Bridge開始</button>
          <button id="bridgeStopBtn" class="danger admin-only" type="button" disabled>Bridge停止</button>
        </div>

        <div id="presetButtons" class="presets admin-only" aria-label="ワンタッププリセット"></div>

        <div class="grid admin-only">
          <label>
            <span>ユーザー名</span>
            <input id="senderInput" value="terminal_user" maxlength="32" autocapitalize="off" autocomplete="off" spellcheck="false" />
          </label>
          <label>
            <span>イベントID</span>
            <input id="eventIdInput" autocapitalize="off" autocomplete="off" spellcheck="false" />
          </label>
          <label>
            <span>イベント種別</span>
            <select id="eventTypeInput">
              <option value="gift">gift</option>
              <option value="like">like</option>
              <option value="chat">chat</option>
              <option value="follow">follow</option>
              <option value="share">share</option>
              <option value="ad_obstacle">ad_obstacle</option>
            </select>
          </label>
          <label>
            <span>ギフト名/ラベル</span>
            <input id="giftNameInput" value="Terminal Gift" maxlength="40" autocomplete="off" spellcheck="false" />
          </label>
          <label>
            <span>ダイヤ数</span>
            <input id="diamondInput" type="number" inputmode="numeric" min="1" max="99999" step="1" value="15" />
          </label>
        </div>

        <div class="actions admin-only">
          <button id="sendBtn" class="primary" type="button">送信</button>
          <button id="randomBtn" class="secondary" type="button">ID更新</button>
          <button id="clearBtn" class="danger" type="button">ログ消去</button>
        </div>

        <div class="chips admin-only" aria-label="送信経路">
          <span id="broadcastChip" class="chip">BroadcastChannel: 未送信</span>
          <span id="storageChip" class="chip">localStorage: 未送信</span>
          <span id="openerChip" class="chip">opener: 未接続</span>
          <span id="bridgeChip" class="chip">bridge: 停止中</span>
        </div>

        <pre id="preview" class="preview admin-only" aria-label="送信プレビュー"></pre>
      </section>

      <pre id="log" class="log admin-only" aria-label="送信ログ"></pre>
    </main>

    <script>
      (() => {
        "use strict";

        const CHANNEL_KEY = "stream_raid_terminal_channel_v1";
        const BRIDGE_URL_KEY = "stream_raid_terminal_bridge_url_v1";
        const BRIDGE_INTERVAL_KEY = "stream_raid_terminal_bridge_interval_v1";
        const BRIDGE_TIKTOK_ID_KEY = "stream_raid_terminal_bridge_tiktok_id_v1";
        const STORAGE_KEY = "stream_raid_terminal_event_v1";
        const SOURCE = "stream-raid-terminal";
        const DEFAULT_BRIDGE_URL = "http://127.0.0.1:8091";
        const query = new URLSearchParams(window.location.search);
        const terminalAdminMode = query.has("admin");
        const $ = (id) => document.getElementById(id);

        const els = {
          status: $("status"),
          channel: $("channelInput"),
          bridgeTiktokId: $("bridgeTikTokIdInput"),
          bridgeUrl: $("bridgeUrlInput"),
          bridgeInterval: $("bridgeIntervalInput"),
          sender: $("senderInput"),
          eventId: $("eventIdInput"),
          eventType: $("eventTypeInput"),
          giftName: $("giftNameInput"),
          diamonds: $("diamondInput"),
          send: $("sendBtn"),
          random: $("randomBtn"),
          clear: $("clearBtn"),
          bridgeHealth: $("bridgeHealthBtn"),
          bridgeConnect: $("bridgeConnectBtn"),
          bridgeStart: $("bridgeStartBtn"),
          bridgeStop: $("bridgeStopBtn"),
          presets: $("presetButtons"),
          broadcastChip: $("broadcastChip"),
          storageChip: $("storageChip"),
          openerChip: $("openerChip"),
          bridgeChip: $("bridgeChip"),
          preview: $("preview"),
          log: $("log"),
        };
        document.body.classList.toggle("admin-mode", terminalAdminMode);

        let serial = 0;
        let bridgeTimer = 0;
        let bridgeAbort = null;
        let bridgeEventSource = null;
        let bridgeStreamTimer = 0;
        let bridgeRunning = false;
        let bridgePolling = false;
        let bridgeCursor = 0;
        let bridgeReceived = 0;
        const presets = [
          { eventType: "like", label: "Like Tap", diamonds: 1, name: "like" },
          { eventType: "chat", label: "Chat Ping", diamonds: 1, name: "chat" },
          { eventType: "follow", label: "Follow Boost", diamonds: 5, name: "follow" },
          { eventType: "share", label: "Share Supply", diamonds: 8, name: "share" },
          { eventType: "gift", label: "Terminal Gift", diamonds: 15, name: "gift" },
          { eventType: "ad_obstacle", label: "Sponsor Jam", diamonds: 50, name: "ad_obstacle" },
        ];

        function readStoredChannel() {
          try {
            const rawQuery = query.get("channel");
            if (rawQuery) return cleanChannel(rawQuery);
            return localStorage.getItem(CHANNEL_KEY) || "stream-raid-live-v1";
          } catch {
            return "stream-raid-live-v1";
          }
        }

        function readStoredBridgeUrl() {
          try {
            return localStorage.getItem(BRIDGE_URL_KEY) || DEFAULT_BRIDGE_URL;
          } catch {
            return DEFAULT_BRIDGE_URL;
          }
        }

        function readStoredBridgeInterval() {
          try {
            return localStorage.getItem(BRIDGE_INTERVAL_KEY) || "1000";
          } catch {
            return "1000";
          }
        }

        function readStoredBridgeTikTokId() {
          try {
            const fromQuery = cleanTikTokId(query.get("room") || query.get("id") || query.get("tiktok") || "");
            return fromQuery || localStorage.getItem(BRIDGE_TIKTOK_ID_KEY) || "";
          } catch {
            return "";
          }
        }

        function cleanChannel(value) {
          return String(value || "stream-raid-live-v1")
            .trim()
            .replace(/[^\w:.-]/g, "-")
            .slice(0, 64) || "stream-raid-live-v1";
        }

        function cleanBridgeUrl(value) {
          const raw = String(value || "").trim() || DEFAULT_BRIDGE_URL;
          try {
            const url = new URL(raw);
            if (!/^https?:$/.test(url.protocol)) return DEFAULT_BRIDGE_URL;
            url.hash = "";
            url.search = "";
            return url.toString().replace(/\/+$/, "");
          } catch {
            return DEFAULT_BRIDGE_URL;
          }
        }

        function cleanTikTokId(value) {
          return String(value || "")
            .trim()
            .replace(/^@+/, "")
            .replace(/[^\w.-]/g, "")
            .slice(0, 40);
        }

        function cleanInterval(value) {
          const ms = Math.round(Number(value) || 1000);
          return Math.min(10000, Math.max(300, ms));
        }

        function cleanText(value, fallback, limit) {
          const next = String(value || "").trim().slice(0, limit);
          return next || fallback;
        }

        function nextId() {
          serial += 1;
          return `terminal-${Date.now()}-${serial}`;
        }

        function ensureId() {
          if (!els.eventId.value.trim()) els.eventId.value = nextId();
        }

        function buildEnvelope() {
          const channel = cleanChannel(els.channel.value);
          const diamonds = Math.max(1, Math.round(Number(els.diamonds.value) || 1));
          const eventType = cleanText(els.eventType.value, "gift", 24);
          const label = cleanText(els.giftName.value, "Terminal Gift", 40);
          const event = {
            id: cleanText(els.eventId.value, nextId(), 80),
            eventType,
            sender: cleanText(els.sender.value, "terminal_user", 32),
            giftName: label,
            label,
            diamondCount: diamonds,
            repeatCount: 1,
          };
          return {
            channel,
            payload: {
              source: SOURCE,
              channel,
              event,
              nonce: `${Date.now()}:${serial}`,
              sentAt: new Date().toISOString(),
            },
          };
        }

        function normalizeBridgeEvent(raw) {
          const payload = raw && typeof raw === "object" ? raw : {};
          const type = cleanText(payload.eventType || payload.type || "gift", "gift", 24);
          const diamonds = Math.max(1, Math.round(Number(payload.diamondCount ?? payload.diamonds) || 1));
          const rawId = payload.externalId || payload.id;
          const fallbackId = rawId ? String(rawId) : nextId();
          const id = cleanText(rawId || fallbackId, fallbackId, 80);
          const sender = cleanText(payload.sender || payload.uniqueId || "tiktok_live", "tiktok_live", 32);
          const label = cleanText(payload.giftName || payload.label || type, type, 40);
          return {
            id: `bridge-${id}`,
            eventType: type,
            type,
            sender,
            giftName: label,
            label,
            diamondCount: diamonds,
            diamonds,
            repeatCount: Math.max(1, Math.round(Number(payload.repeatCount) || 1)),
            bridgeEventId: payload.id ?? null,
            bridgeSource: payload.source || "tiktok-live",
            receivedAt: payload.receivedAt || Date.now(),
          };
        }

        function buildBridgeEnvelope(events, cursor) {
          const channel = cleanChannel(els.channel.value);
          return {
            channel,
            payload: {
              source: SOURCE,
              channel,
              events: events.map(normalizeBridgeEvent),
              nonce: `${Date.now()}:${serial}`,
              bridgeCursor: cursor,
              sentAt: new Date().toISOString(),
            },
          };
        }

        function setText(el, text, bad) {
          el.textContent = text;
          el.classList.toggle("bad", Boolean(bad));
        }

        function updatePreview() {
          const built = buildEnvelope();
          els.channel.value = built.channel;
          els.preview.textContent = JSON.stringify(built.payload, null, 2);
          try {
            localStorage.setItem(CHANNEL_KEY, built.channel);
            localStorage.setItem(BRIDGE_URL_KEY, cleanBridgeUrl(els.bridgeUrl.value));
            localStorage.setItem(BRIDGE_INTERVAL_KEY, String(cleanInterval(els.bridgeInterval.value)));
            localStorage.setItem(BRIDGE_TIKTOK_ID_KEY, cleanTikTokId(els.bridgeTiktokId.value));
          } catch {
            // Private browsing may block storage.
          }
          setText(els.openerChip, window.opener ? "opener: 接続あり" : "opener: 未接続", false);
        }

        function applyPreset(preset) {
          els.eventType.value = preset.eventType;
          els.giftName.value = preset.label;
          els.diamonds.value = String(preset.diamonds);
          els.eventId.value = nextId();
          updatePresetState(preset.eventType);
          updatePreview();
          els.status.textContent = `${preset.name} プリセットをセットしました`;
        }

        function updatePresetState(eventType) {
          for (const button of els.presets.querySelectorAll("button")) {
            button.setAttribute("aria-pressed", String(button.dataset.eventType === eventType));
          }
        }

        function renderPresets() {
          const fragment = document.createDocumentFragment();
          for (const preset of presets) {
            const button = document.createElement("button");
            button.className = "preset";
            button.type = "button";
            button.dataset.eventType = preset.eventType;
            button.innerHTML = `<strong>${preset.name}</strong><span>${preset.label} / ${preset.diamonds}D</span>`;
            button.addEventListener("click", () => applyPreset(preset));
            fragment.appendChild(button);
          }
          els.presets.appendChild(fragment);
        }

        function log(line) {
          const stamp = new Date().toLocaleTimeString();
          els.log.textContent = `[${stamp}] ${line}\n${els.log.textContent}`.slice(0, 5000);
        }

        function eventSummary(payload) {
          if (payload.event) {
            return `${payload.event.sender} / ${payload.event.eventType} / ${payload.event.giftName} / ${payload.event.diamondCount}D`;
          }
          const count = Array.isArray(payload.events) ? payload.events.length : 0;
          return `${count}件のbridgeイベント`;
        }

        function publishEnvelope(channel, payload) {
          const results = [];

          if (typeof BroadcastChannel === "undefined") {
            setText(els.broadcastChip, "BroadcastChannel: 非対応", true);
            results.push("BroadcastChannel unsupported");
          } else {
            try {
              const bc = new BroadcastChannel(channel);
              bc.postMessage(payload);
              setTimeout(() => bc.close(), 80);
              setText(els.broadcastChip, `BroadcastChannel: ${channel}`, false);
              results.push("BroadcastChannel ok");
            } catch (err) {
              setText(els.broadcastChip, "BroadcastChannel: 失敗", true);
              results.push(`BroadcastChannel failed: ${err && err.message ? err.message : err}`);
            }
          }

          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            localStorage.setItem(CHANNEL_KEY, channel);
            setText(els.storageChip, "localStorage: 送信", false);
            results.push("localStorage ok");
          } catch (err) {
            setText(els.storageChip, "localStorage: 失敗", true);
            results.push(`localStorage failed: ${err && err.message ? err.message : err}`);
          }

          if (window.opener && !window.opener.closed) {
            try {
              window.opener.postMessage(payload, window.location.origin);
              setText(els.openerChip, "opener: postMessage送信", false);
              results.push("opener postMessage ok");
            } catch (err) {
              setText(els.openerChip, "opener: 失敗", true);
              results.push(`opener failed: ${err && err.message ? err.message : err}`);
            }
          } else {
            setText(els.openerChip, "opener: 未接続", false);
            results.push("opener unavailable");
          }

          return results;
        }

        function send() {
          ensureId();
          const { channel, payload } = buildEnvelope();
          const results = publishEnvelope(channel, payload);

          els.status.textContent = `${eventSummary(payload)} を送信`;
          log(`${payload.event.id} -> ${results.join(", ")}`);
          els.eventId.value = nextId();
          updatePreview();
        }

        function setBridgeRunning(nextRunning) {
          bridgeRunning = nextRunning;
          els.bridgeConnect.disabled = nextRunning;
          els.bridgeStart.disabled = nextRunning;
          els.bridgeStop.disabled = !nextRunning;
        }

        function setBridgeStatus(text, bad) {
          setText(els.bridgeChip, text, bad);
          els.status.textContent = text;
        }

        function bridgeEventsUrl(max = 100) {
          const base = cleanBridgeUrl(els.bridgeUrl.value);
          const url = new URL(`${base}/events`);
          url.searchParams.set("since", String(bridgeCursor));
          url.searchParams.set("max", String(max));
          return url;
        }

        function bridgeStreamUrl() {
          const base = cleanBridgeUrl(els.bridgeUrl.value);
          return new URL(`${base}/stream`);
        }

        function bridgeConnectUrl() {
          const base = cleanBridgeUrl(els.bridgeUrl.value);
          return new URL(`${base}/connect`);
        }

        function bridgeHealthUrl() {
          const base = cleanBridgeUrl(els.bridgeUrl.value);
          return new URL(`${base}/health`);
        }

        function bridgeErrorMessage(errorLike, fallback) {
          if (!errorLike) return fallback;
          if (typeof errorLike === "string") return errorLike;
          if (typeof errorLike.message === "string" && errorLike.message) return errorLike.message;
          if (typeof errorLike.code === "string" && errorLike.code) return errorLike.code;
          try {
            return JSON.stringify(errorLike);
          } catch {
            return fallback;
          }
        }

        function isLocalBridgeTarget() {
          try {
            const host = new URL(cleanBridgeUrl(els.bridgeUrl.value)).hostname;
            return host === "127.0.0.1" || host === "localhost" || host === "[::1]" || host === "::1";
          } catch {
            return false;
          }
        }

        function bridgeFetchErrorMessage(err) {
          const raw = err && err.message ? err.message : String(err);
          if (isLocalBridgeTarget() && /failed to fetch|networkerror|load failed|fetch/i.test(raw)) {
            return `ローカルbridge未起動。プロジェクトで npm run live:bridge:tiktok を実行してから再試行 (${raw})`;
          }
          return raw;
        }

        function bridgeConnectorState(body) {
          const connector = body && body.connector && typeof body.connector === "object" ? body.connector : {};
          const username = connector.username ? `@${connector.username}` : cleanTikTokId(els.bridgeTiktokId.value) ? `@${cleanTikTokId(els.bridgeTiktokId.value)}` : "ID未指定";
          const cursor = readBridgeCursor(body, bridgeCursor);
          if (connector.connected) return { text: `TikTok接続中 ${username}`, cursor, bad: false };
          if (connector.error) return { text: `TikTok未接続: ${bridgeErrorMessage(connector.error, "error")}`, cursor, bad: true };
          if (connector.available === false) return { text: `TikTok未接続: tiktok-live-connector未導入`, cursor, bad: true };
          if (connector.username || cleanTikTokId(els.bridgeTiktokId.value)) return { text: `TikTok接続待ち ${username}`, cursor, bad: false };
          return { text: "TikTok未接続: TikTok ID未指定", cursor, bad: false };
        }

        function setBridgeStatusFromBody(prefix, body) {
          bridgeCursor = readBridgeCursor(body, bridgeCursor);
          const state = bridgeConnectorState(body);
          setBridgeStatus(`bridge: ${prefix} / ${state.text} / cursor ${state.cursor}`, state.bad);
          if (state.bad) log(`bridge connector warning: ${state.text}`);
          return state;
        }

        function summarizeBridgeHealth(body) {
          const connector = body && body.connector && typeof body.connector === "object" ? body.connector : {};
          const username = connector.username ? `@${connector.username}` : "ID未指定";
          const available = connector.available === false ? "依存なし" : "依存OK";
          const connected = connector.connected ? "接続中" : "未接続";
          const cursor = readBridgeCursor(body, bridgeCursor);
          const error = connector.error ? ` / ${bridgeErrorMessage(connector.error, "error")}` : "";
          return `${username} ${available} ${connected} / cursor ${cursor}${error}`;
        }

        function readBridgeCursor(body, fallback = bridgeCursor) {
          const cursor = Number(body && body.cursor);
          return Number.isFinite(cursor) ? Math.max(0, Math.floor(cursor)) : fallback;
        }

        function maxBridgeEventId(events) {
          let maxId = bridgeCursor;
          for (const event of events) {
            const id = Number(event && event.id);
            if (Number.isFinite(id)) maxId = Math.max(maxId, Math.floor(id));
          }
          return maxId;
        }

        function minBridgeEventId(events) {
          let minId = Infinity;
          for (const event of events) {
            const id = Number(event && event.id);
            if (Number.isFinite(id)) minId = Math.min(minId, Math.floor(id));
          }
          return Number.isFinite(minId) ? minId : bridgeCursor;
        }

        function scheduleBridgePoll(delay) {
          if (!bridgeRunning) return;
          window.clearTimeout(bridgeTimer);
          bridgeTimer = window.setTimeout(pollBridge, Math.max(0, delay));
        }

        function publishBridgeEvents(nextEvents, cursor, sourceLabel = "bridge") {
          if (!nextEvents.length) return;
          const previousCursor = bridgeCursor;
          const firstEventId = minBridgeEventId(nextEvents);
          bridgeCursor = Math.max(maxBridgeEventId(nextEvents), readBridgeCursor({ cursor }, bridgeCursor));
          const { channel, payload } = buildBridgeEnvelope(nextEvents, bridgeCursor);
          const results = publishEnvelope(channel, payload);
          bridgeReceived += payload.events.length;
          if (sourceLabel === "poll" && nextEvents.length >= 100 && firstEventId > previousCursor + 1) {
            log(`bridge backlog warning: missed before ${firstEventId}, cursor ${cursor}`);
          }
          setBridgeStatus(`bridge: ${sourceLabel}受信中 / ${bridgeReceived}件 / cursor ${bridgeCursor}`, false);
          log(`bridge ${sourceLabel} ${payload.events.length}件 -> ${results.join(", ")}`);
        }

        async function pollBridge() {
          if (!bridgeRunning || bridgePolling) return;
          bridgePolling = true;
          bridgeAbort = new AbortController();
          const interval = cleanInterval(els.bridgeInterval.value);
          try {
            const response = await fetch(bridgeEventsUrl(100), {
              method: "GET",
              cache: "no-store",
              signal: bridgeAbort.signal,
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const body = await response.json();
            const nextEvents = Array.isArray(body.events) ? body.events : [];
            if (nextEvents.length) {
              const bodyCursor = readBridgeCursor(body);
              publishBridgeEvents(nextEvents, bodyCursor, "poll");
            } else {
              setBridgeStatusFromBody("poll待受", body);
            }
          } catch (err) {
            if (!bridgeRunning || (err && err.name === "AbortError")) return;
            const message = bridgeFetchErrorMessage(err);
            setBridgeStatus(`bridge: 取得失敗 (${message})`, true);
            log(`bridge fetch failed: ${message}`);
          } finally {
            bridgePolling = false;
            bridgeAbort = null;
            scheduleBridgePoll(interval);
          }
        }

        async function syncBridgeCursor() {
          const response = await fetch(bridgeEventsUrl(1), {
            method: "GET",
            cache: "no-store",
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const body = await response.json();
          bridgeCursor = readBridgeCursor(body, 0);
          return bridgeCursor;
        }

        async function checkBridgeHealth() {
          els.bridgeUrl.value = cleanBridgeUrl(els.bridgeUrl.value);
          updatePreview();
          setBridgeStatus("bridge: health確認中", false);
          try {
            const response = await fetch(bridgeHealthUrl().toString(), {
              method: "GET",
              cache: "no-store",
            });
            const body = await response.json().catch(() => ({}));
            if (!response.ok || body.ok === false) throw new Error(bridgeErrorMessage(body.error, `HTTP ${response.status}`));
            bridgeCursor = readBridgeCursor(body, bridgeCursor);
            const summary = summarizeBridgeHealth(body);
            setBridgeStatus(`bridge: ${summary}`, body.connector && body.connector.available === false);
            log(`bridge health -> ${summary}`);
          } catch (err) {
            const message = bridgeFetchErrorMessage(err);
            setBridgeStatus(`bridge: health失敗 (${message})`, true);
            log(`bridge health failed: ${message}`);
          }
        }

        function closeBridgeStream() {
          window.clearTimeout(bridgeStreamTimer);
          bridgeStreamTimer = 0;
          if (bridgeEventSource) {
            bridgeEventSource.close();
            bridgeEventSource = null;
          }
        }

        async function startBridgePolling(reason, options = {}) {
          if (!bridgeRunning) return;
          const shouldSync = options.sync !== false;
          closeBridgeStream();
          setBridgeStatus(reason ? `bridge: ${reason} / ${shouldSync ? "同期中" : "poll継続"}` : `bridge: ${shouldSync ? "同期中" : "poll継続"}`, false);
          try {
            if (shouldSync) await syncBridgeCursor();
            setBridgeStatus(`bridge: poll開始 / cursor ${bridgeCursor}`, false);
            pollBridge();
          } catch (err) {
            setBridgeStatus(`bridge: 開始失敗 (${bridgeFetchErrorMessage(err)})`, true);
            setBridgeRunning(false);
          }
        }

        function parseBridgeMessage(message) {
          try {
            return JSON.parse(message && message.data ? message.data : "{}");
          } catch (err) {
            log(`bridge SSE parse failed: ${err && err.message ? err.message : err}`);
            return null;
          }
        }

        function startBridgeStream() {
          if (typeof EventSource === "undefined") {
            startBridgePolling("SSE非対応");
            return;
          }

          let stream;
          try {
            stream = new EventSource(bridgeStreamUrl().toString());
          } catch (err) {
            log(`bridge SSE failed to start: ${err && err.message ? err.message : err}`);
            startBridgePolling("SSE起動失敗");
            return;
          }
          bridgeEventSource = stream;
          let opened = false;
          let cursorReady = false;

          bridgeStreamTimer = window.setTimeout(() => {
            if (!bridgeRunning || bridgeEventSource !== stream || opened) return;
            log("bridge SSE open timeout; falling back to polling");
            startBridgePolling("SSE未応答");
          }, 2500);

          stream.onopen = () => {
            if (!bridgeRunning || bridgeEventSource !== stream) return;
            opened = true;
            window.clearTimeout(bridgeStreamTimer);
            bridgeStreamTimer = 0;
            setBridgeStatus(`bridge: SSE接続中 / status待ち / cursor ${bridgeCursor}`, false);
          };

          stream.addEventListener("status", (message) => {
            if (!bridgeRunning || bridgeEventSource !== stream) return;
            const body = parseBridgeMessage(message);
            if (!body) return;
            cursorReady = true;
            setBridgeStatusFromBody("SSE", body);
          });

          stream.addEventListener("liveEvent", (message) => {
            if (!bridgeRunning || bridgeEventSource !== stream) return;
            const event = parseBridgeMessage(message);
            if (!event) return;
            publishBridgeEvents([event], Number(event.id), "SSE");
            cursorReady = true;
          });

          stream.onerror = () => {
            if (!bridgeRunning || bridgeEventSource !== stream) return;
            log("bridge SSE unavailable; falling back to polling");
            startBridgePolling("SSE失敗", { sync: !cursorReady });
          };
        }

        async function startBridge() {
          els.bridgeUrl.value = cleanBridgeUrl(els.bridgeUrl.value);
          els.bridgeTiktokId.value = cleanTikTokId(els.bridgeTiktokId.value);
          els.bridgeInterval.value = String(cleanInterval(els.bridgeInterval.value));
          bridgeCursor = 0;
          bridgeReceived = 0;
          setBridgeRunning(true);
          setBridgeStatus("bridge: SSE接続中", false);
          updatePreview();
          startBridgeStream();
        }

        async function connectBridgeAndStart() {
          const tiktokId = cleanTikTokId(els.bridgeTiktokId.value);
          els.bridgeTiktokId.value = tiktokId;
          els.bridgeUrl.value = cleanBridgeUrl(els.bridgeUrl.value);
          els.bridgeInterval.value = String(cleanInterval(els.bridgeInterval.value));
          updatePreview();
          if (!tiktokId) {
            setBridgeStatus("bridge: TikTok IDを入力してください", true);
            return;
          }

          window.clearTimeout(bridgeTimer);
          bridgeTimer = 0;
          if (bridgeAbort) bridgeAbort.abort();
          closeBridgeStream();
          bridgeCursor = 0;
          bridgeReceived = 0;
          setBridgeRunning(true);
          setBridgeStatus(`bridge: ${tiktokId} 接続要求中`, false);
          try {
            const response = await fetch(bridgeConnectUrl().toString(), {
              method: "POST",
              cache: "no-store",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username: tiktokId }),
            });
            const body = await response.json().catch(() => ({}));
            if (!bridgeRunning) return;
            if (!response.ok || body.ok === false) {
              const message = bridgeErrorMessage(body && body.error, `HTTP ${response.status}`);
              throw new Error(message);
            }
            bridgeCursor = readBridgeCursor(body, 0);
            const state = bridgeConnectorState(body);
            setBridgeStatus(`bridge: ${tiktokId} 接続要求済 / ${state.text} / SSE接続中`, state.bad);
            log(`bridge connect ${tiktokId} -> cursor ${bridgeCursor}`);
            startBridgeStream();
          } catch (err) {
            const message = bridgeFetchErrorMessage(err);
            setBridgeStatus(`bridge: ID接続失敗 (${message})`, true);
            log(`bridge connect failed: ${message}`);
            setBridgeRunning(false);
          }
        }

        function stopBridge() {
          setBridgeRunning(false);
          window.clearTimeout(bridgeTimer);
          bridgeTimer = 0;
          if (bridgeAbort) bridgeAbort.abort();
          closeBridgeStream();
          setBridgeStatus(`bridge: 停止中 / ${bridgeReceived}件`, false);
        }

        els.channel.value = readStoredChannel();
        els.bridgeTiktokId.value = readStoredBridgeTikTokId();
        els.bridgeUrl.value = readStoredBridgeUrl();
        els.bridgeInterval.value = readStoredBridgeInterval();
        els.eventId.value = nextId();
        renderPresets();
        updatePreview();
        updatePresetState(els.eventType.value);

        els.send.addEventListener("click", send);
        els.random.addEventListener("click", () => {
          els.eventId.value = nextId();
          updatePreview();
        });
        els.clear.addEventListener("click", () => {
          els.log.textContent = "";
          els.status.textContent = "ログを消去しました";
        });
        els.bridgeHealth.addEventListener("click", checkBridgeHealth);
        els.bridgeConnect.addEventListener("click", connectBridgeAndStart);
        els.bridgeStart.addEventListener("click", startBridge);
        els.bridgeStop.addEventListener("click", stopBridge);

        for (const input of [els.channel, els.bridgeTiktokId, els.bridgeUrl, els.bridgeInterval, els.sender, els.eventId, els.eventType, els.giftName, els.diamonds]) {
          input.addEventListener("input", updatePreview);
          input.addEventListener("change", () => {
            updatePresetState(els.eventType.value);
            updatePreview();
          });
        }
      })();
    </script>
  </body>
</html>
