<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#160b16" />
    <title>配信権限登録 / STREAM RAID ARENA</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #160b16;
        --panel: #241125;
        --line: #8f6b3f;
        --text: #f7fbff;
        --muted: #b8bcc8;
        --accent: #ffd166;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background:
          linear-gradient(90deg, rgba(255, 209, 102, 0.08) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 209, 102, 0.08) 1px, transparent 1px),
          var(--bg);
        background-size: 24px 24px;
        color: var(--text);
      }
      main {
        width: min(720px, 100%);
        display: grid;
        gap: 14px;
        padding: 18px;
        border: 1px solid var(--line);
        background: rgba(36, 17, 37, 0.92);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      }
      h1 {
        margin: 0;
        font-size: clamp(22px, 5vw, 40px);
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      form {
        display: grid;
        gap: 10px;
      }
      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
      }
      input,
      textarea,
      button,
      a {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 10px 12px;
        font: inherit;
      }
      input,
      textarea {
        width: 100%;
        background: #120812;
        color: var(--text);
      }
      button,
      a {
        color: #160b16;
        background: var(--accent);
        text-decoration: none;
        text-align: center;
        cursor: pointer;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .row > * {
        flex: 1 1 180px;
      }
      small {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>配信権限登録</h1>
      <p>TikTokアカウントがまだない、または配信権限の解放が必要なプレイヤー向けの仮登録導線です。正式な代理店フォームURLが決まり次第、このページの送信先を差し替えます。</p>
      <form id="agencyForm">
        <label>
          希望名
          <input name="name" maxlength="40" autocomplete="name" />
        </label>
        <label>
          連絡先またはSNS
          <input name="contact" maxlength="120" inputmode="email" />
        </label>
        <label>
          配信予定・相談内容
          <textarea name="note" maxlength="600" rows="5"></textarea>
        </label>
        <div class="row">
          <button type="submit">ローカル保存</button>
          <a href="./index.html">ゲームへ戻る</a>
        </div>
        <small id="status">送信内容はこの端末のlocalStorageに保存されます。</small>
      </form>
    </main>
    <script>
      const form = document.getElementById("agencyForm");
      const status = document.getElementById("status");
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        const rows = JSON.parse(localStorage.getItem("stream_raid_agency_signups_v1") || "[]");
        rows.unshift({ ...data, at: Date.now() });
        localStorage.setItem("stream_raid_agency_signups_v1", JSON.stringify(rows.slice(0, 80)));
        form.reset();
        status.textContent = "保存しました。正式フォーム接続時にこの導線を差し替えます。";
      });
    </script>
  </body>
</html>
